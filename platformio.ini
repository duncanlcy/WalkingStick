; WalkingStick platform — multi-device firmware build
;
; Devices:
;   waist_safety_pad  — hub: fall detection, data collection, alerts
;   shoe_pad          — foot-pressure / gait sensors
;   walking_stick     — handle UI, haptics, local alerts

[platformio]
default_envs = waist_safety_pad, shoe_pad, walking_stick

[common]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DPROTOCOL_VERSION=1

[env:waist_safety_pad]
extends = common
board = esp32dev
build_flags =
    ${common.build_flags}
    -DDEVICE_ROLE=DEVICE_WAIST_SAFETY_PAD
    -DBLE_DEVICE_NAME=\"WalkingStick-Waist\"
build_src_filter = +<waist_safety_pad/>

[env:shoe_pad]
extends = common
board = esp32dev
build_flags =
    ${common.build_flags}
    -DDEVICE_ROLE=DEVICE_SHOE_PAD
    -DBLE_DEVICE_NAME=\"WalkingStick-Shoe\"
build_src_filter = +<shoe_pad/>

[env:walking_stick]
extends = common
board = esp32dev
build_flags =
    ${common.build_flags}
    -DDEVICE_ROLE=DEVICE_WALKING_STICK
    -DBLE_DEVICE_NAME=\"WalkingStick-Handle\"
build_src_filter = +<walking_stick/>
