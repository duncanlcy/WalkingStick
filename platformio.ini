; WalkingStick multi-target firmware build
; Flash one target:  pio run -e waist_hub
; Flash all:         ./tools/flash_all.sh

[platformio]
default_envs = waist_hub, walking_stick, shoe_pad_left, shoe_pad_right
src_dir = firmware

[common]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DWALKINGSTICK_FW_VERSION=\"0.1.0\"
    -I firmware/shared
lib_extra_dirs = firmware/shared

[env:waist_hub]
extends = common
board = esp32dev
build_flags =
    ${common.build_flags}
    -DROLE_WAIST_HUB=1
    -DDEVICE_NAME=\"WalkingStick-Hub\"
build_src_filter = +<*> -<walking_stick/> -<shoe_pad/>

[env:walking_stick]
extends = common
board = esp32-c3-devkitm-1
build_flags =
    ${common.build_flags}
    -DROLE_WALKING_STICK=1
    -DDEVICE_NAME=\"WalkingStick-Stick\"
build_src_filter = +<*> -<waist_hub/> -<shoe_pad/>

[env:shoe_pad_left]
extends = common
board = esp32-c3-devkitm-1
build_flags =
    ${common.build_flags}
    -DROLE_SHOE_PAD=1
    -DSHOE_SIDE_LEFT=1
    -DDEVICE_NAME=\"WalkingStick-Shoe-L\"
build_src_filter = +<*> -<waist_hub/> -<walking_stick/> -<shoe_pad/right/>

[env:shoe_pad_right]
extends = common
board = esp32-c3-devkitm-1
build_flags =
    ${common.build_flags}
    -DROLE_SHOE_PAD=1
    -DSHOE_SIDE_RIGHT=1
    -DDEVICE_NAME=\"WalkingStick-Shoe-R\"
build_src_filter = +<*> -<waist_hub/> -<walking_stick/> -<shoe_pad/left/>
